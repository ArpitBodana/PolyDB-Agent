version: "3.8"

services:
  mongodb:
    image: mongodb/mongodb-atlas-local
    container_name: mongo-atlas
    ports:
      - "27017:27017"
    environment:
      MONGODB_INITDB_ROOT_USERNAME: admin
      MONGODB_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
      - mongot_data:/data/mongot

volumes:
  mongo_data:
  mongot_data:
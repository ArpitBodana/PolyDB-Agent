server:
  port: 8091

spring:
  application:
    name: export-data-mcp

  ai:
    mcp:
      server:
        enabled: true
        protocol: STREAMABLE
        name: export-data-mcp-server
        version: 1.0.0
        streamable-http:
          mcp-endpoint: /mcp
          keep-alive-interval: 30s
        tool-change-notification: true
        resource-change-notification: true
        prompt-change-notification: true

logging:
  level:
    org.springframework.ai: DEBUG